<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <style>
      .logo-text { font-family: 'Georgia', 'Times New Roman', serif; }
    </style>
  </defs>
  
  <!-- Red kiss/lips mark - background accent -->
  <g opacity="0.18" transform="translate(60, 20) scale(0.55)">
    <ellipse cx="80" cy="50" rx="75" ry="35" fill="#cc0000"/>
    <ellipse cx="50" cy="30" rx="40" ry="22" fill="#cc0000" transform="rotate(-15, 50, 30)"/>
    <ellipse cx="110" cy="30" rx="40" ry="22" fill="#cc0000" transform="rotate(15, 110, 30)"/>
    <ellipse cx="80" cy="65" rx="30" ry="18" fill="#cc0000"/>
  </g>

  <!-- Sun icon -->
  <g transform="translate(205, 12)" stroke="#222" stroke-width="1.2" fill="none">
    <circle cx="0" cy="0" r="5" fill="#fff" stroke="#222"/>
    <line x1="0" y1="-9" x2="0" y2="-12"/>
    <line x1="6.4" y1="-6.4" x2="8.5" y2="-8.5"/>
    <line x1="9" y1="0" x2="12" y2="0"/>
    <line x1="6.4" y1="6.4" x2="8.5" y2="8.5"/>
    <line x1="0" y1="9" x2="0" y2="12"/>
    <line x1="-6.4" y1="6.4" x2="-8.5" y2="8.5"/>
    <line x1="-9" y1="0" x2="-12" y2="0"/>
    <line x1="-6.4" y1="-6.4" x2="-8.5" y2="-8.5"/>
  </g>

  <!-- Large decorative S -->
  <text x="30" y="72" class="logo-text" font-size="72" font-weight="700" fill="#1a1a1a" letter-spacing="-2">S</text>
  
  <!-- "unSea" text -->
  <text x="72" y="72" class="logo-text" font-size="48" font-weight="700" fill="#1a1a1a" letter-spacing="-1">unSea</text>

  <!-- ESTD 2026 · MAKEUP STORE subtitle -->
  <text x="160" y="90" class="logo-text" font-size="9" fill="#555" letter-spacing="1.5" text-anchor="middle">ESTD 2026 · MAKEUP STORE</text>
</svg>
